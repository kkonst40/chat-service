services:
  chatdb:
    image: postgres:17
    container_name: chat_db
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:${DB_PORT}"
    volumes:
      - chat_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chatnetwork

  chatcache:
    image: redis:7
    container_name: chat_cache
    restart: always
    command: [
      "redis-server",
      "--maxmemory", "256mb",
      "--maxmemory-policy", "allkeys-lru"
    ]
    ports:
      - "6379:${REDIS_PORT}"
    networks:
      - chatnetwork

  chatapp:
    build:
      context: ./ichat
      dockerfile: Dockerfile
    container_name: chat_app
    restart: on-failure
    depends_on:
      chatdb:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:${PORT}"
    networks:
      - iappnetwork
      - chatnetwork

networks:
  iappnetwork:
    external: true
  chatnetwork:
    driver: bridge

volumes:
  chat_pgdata: