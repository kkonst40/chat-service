<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>iChat</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
        }

        #sidebar {
            width: 300px;
            border-right: 1px solid #ccc;
            overflow-y: auto;
            background: #f9f9f9;
        }

        #chat-filters {
            display: flex;
            gap: 4px;
            padding: 0 10px 10px 10px;
        }

        .filter-btn {
            flex: 1;
            padding: 6px 4px;
            font-size: 0.85em;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
        }

        .filter-btn.active {
            background: #d1e7ff;
            border-color: #7cb1ff;
        }

        #chat-window {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
        }

        #input-area {
            padding: 20px;
            border-top: 1px solid #ccc;
            display: flex;
            gap: 10px;
        }

        .chat-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }

        .chat-item:hover {
            background: #e0e0e0;
        }

        .chat-item.active {
            background: #d1e7ff;
        }

        .chat-time {
            font-size: 0.7em;
            color: #888;
            margin-top: 4px;
        }

        .message {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 5px;
            background: #f1f1f1;
        }

        .msg-actions {
            font-size: 0.75em;
            margin-left: 10px;
            float: right;
        }

        .btn-del {
            color: red;
            cursor: pointer;
            margin-left: 5px;
        }

        .btn-edit {
            color: blue;
            cursor: pointer;
        }

        input {
            flex-grow: 1;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h3 style="padding-left: 10px;">Чаты</h3>
        <div id="chat-filters">
            <button class="filter-btn active" data-filter="all" onclick="setChatFilter('all')">Все</button>
            <button class="filter-btn" data-filter="personal" onclick="setChatFilter('personal')">Личные</button>
            <button class="filter-btn" data-filter="group" onclick="setChatFilter('group')">Группы</button>
        </div>
        <div id="chats-list"></div>
    </div>

    <div id="chat-window">
        <div id="messages">Выберите чат...</div>
        <div id="input-area" style="display: none;">
            <input type="text" id="msg-input" placeholder="Введите сообщение...">
            <button id="send-btn" onclick="handleSend()">Отправить</button>
            <button id="cancel-edit" style="display:none;" onclick="exitEditMode()">Отмена</button>
        </div>
    </div>

    <script>
        let currentChatId = null;
        let editingMessageId = null;
        let socket = null;
        let allChats = [];
        let currentChatFilter = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            loadChats();
            connectWebSocket();
        });

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            socket = new WebSocket(`${protocol}//${window.location.host}/connect`);

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleServerEvent(data);
            };
            socket.onclose = () => setTimeout(connectWebSocket, 3000);
        }

        function handleServerEvent(event) {
            if (event.type === 'CREATE_MESSAGE') {
                const chat = allChats.find(c => c.id === event.chat_id);
                if (chat) {
                    chat.lastMessageAt = new Date().toISOString();
                    renderChats();
                }

                if (event.chat_id === currentChatId) {
                    appendMessage(event.payload);
                }
            }

            if (event.chat_id === currentChatId) {
                if (event.type === 'UPDATE_MESSAGE') {
                    const msgTextSpan = document.querySelector(`#msg-${event.payload.msg_id} .text-content`);
                    if (msgTextSpan) msgTextSpan.innerText = event.payload.text;
                }
                if (event.type === 'DELETE_MESSAGE') {
                    const msgEl = document.getElementById(`msg-${event.payload.msg_id}`);
                    if (msgEl) msgEl.remove();
                }
            }

            if (['CREATE_CHAT', 'DELETE_CHAT', 'UPDATE_CHAT'].includes(event.type)) {
                loadChats();
            }
        }

        async function apiRequest(url, method = 'GET', body = null) {
            const options = {
                method,
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' }
            };
            if (body) options.body = JSON.stringify(body);
            const response = await fetch(url, options);
            return response.ok ? response.json() : null;
        }

        async function loadChats() {
            let url = '/chats';
            if (currentChatFilter === 'personal' || currentChatFilter === 'group') {
                url = `/chats?filter=${currentChatFilter}`;
            }
            const data = await apiRequest(url);
            if (data && data.chats) {
                allChats = data.chats;
                renderChats();
            }
        }

        function setChatFilter(filter) {
            if (!['all', 'personal', 'group'].includes(filter)) return;
            currentChatFilter = filter;

            const buttons = document.querySelectorAll('#chat-filters .filter-btn');
            buttons.forEach(btn => {
                if (btn.getAttribute('data-filter') === filter) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            loadChats();
        }

        function renderChats() {
            const list = document.getElementById('chats-list');
            list.innerHTML = '';

            // Сортировка: новые (большие даты) — сверху
            const sortedChats = [...allChats].sort((a, b) =>
                new Date(b.lastMessageAt) - new Date(a.lastMessageAt)
            );

            sortedChats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;

                // Форматируем дату для наглядности
                const dateStr = new Date(chat.lastMessageAt).toLocaleString();

                div.innerHTML = `
                    <strong>${chat.name}</strong>
                    <span class="chat-time">${dateStr}</span>
                `;
                div.onclick = () => selectChat(chat.id);
                list.appendChild(div);
            });
        }

        async function selectChat(chatId) {
            currentChatId = chatId;
            exitEditMode();
            document.getElementById('input-area').style.display = 'flex';
            renderChats();

            const data = await apiRequest(`/chatmessages/${chatId}`);
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';

            if (data && data.messages) {
                data.messages.reverse().forEach(msg => appendMessage({
                    msg_id: msg.id,
                    user_id: msg.userId,
                    user_name: msg.userName,
                    text: msg.text
                }));
            }
        }

        async function handleSend() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !currentChatId) return;

            if (editingMessageId) {
                await apiRequest(`/chatmessages/${editingMessageId}`, 'PUT', { text });
                exitEditMode();
            } else {
                await apiRequest(`/chatmessages/${currentChatId}`, 'POST', { text });
            }
            input.value = '';
        }

        function enterEditMode(msgId, currentText) {
            editingMessageId = msgId;
            const input = document.getElementById('msg-input');
            input.value = currentText;
            document.getElementById('send-btn').innerText = 'Сохранить';
            document.getElementById('cancel-edit').style.display = 'inline-block';
            input.focus();
        }

        function exitEditMode() {
            editingMessageId = null;
            const input = document.getElementById('msg-input');
            input.value = '';
            document.getElementById('send-btn').innerText = 'Отправить';
            document.getElementById('cancel-edit').style.display = 'none';
        }

        async function deleteMessage(messageId) {
            await apiRequest(`/chatmessages/${messageId}`, 'DELETE');
        }

        function appendMessage(payload) {
            const messagesDiv = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message';
            div.id = `msg-${payload.msg_id}`;
            const displayName = payload.userName || payload.user_name || payload.user_id;
            //const displayName = payload.userName || payload.user_name
            div.innerHTML = `
            <div class="msg-actions">
                <span class="btn-edit" onclick="enterEditMode('${payload.msg_id}', '${payload.text.replace(/'/g, "\\'")}')">ред.</span>
                <span class="btn-del" onclick="deleteMessage('${payload.msg_id}')">удалить</span>
            </div>
            <strong>${displayName}:</strong> 
            <span class="text-content">${payload.text}</span>
        `;
            messagesDiv.appendChild(div);
        }
    </script>
</body>

</html>
