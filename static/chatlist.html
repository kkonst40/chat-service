<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список чатов</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        #loading {
            text-align: center;
            color: #666;
            margin: 20px 0;
        }

        #error {
            color: #d32f2f;
            background-color: #ffebee;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            display: none;
        }

        #chats-list {
            list-style-type: none;
            padding: 0;
        }

        .chat-item {
            padding: 15px;
            margin: 10px 0;
            background-color: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid #4285f4;
            transition: all 0.3s ease;
        }

        .chat-item:hover {
            background-color: #e8f0fe;
            transform: translateX(5px);
        }

        .chat-name {
            font-size: 18px;
            font-weight: 500;
            color: #333;
        }

        #user-id-display {
            background-color: #e8f0fe;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
        }

        button {
            background-color: #4285f4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 0;
        }

        button:hover {
            background-color: #3367d6;
        }
    </style>
</head>

<body>
    <h1>📱 Мои чаты</h1>

    <div id="user-id-display">
        <strong>UserID:</strong> <span id="user-id">Загрузка...</span>
    </div>

    <button onclick="loadChats()">🔄 Обновить список</button>

    <div id="loading">Загрузка чатов...</div>

    <div id="error"></div>

    <ul id="chats-list"></ul>

    <script>
        function getOrCreateUserId() {
            return '019bad77-a48a-712b-af62-65e0cc331079';
        }

        function displayUserId() {
            const userId = getOrCreateUserId();
            document.getElementById('user-id').textContent = userId;
            return userId;
        }

        async function loadChats() {
            const loadingElement = document.getElementById('loading');
            const errorElement = document.getElementById('error');
            const chatsListElement = document.getElementById('chats-list');

            loadingElement.style.display = 'block';
            errorElement.style.display = 'none';
            chatsListElement.innerHTML = '';

            try {
                const userId = displayUserId();

                const response = await fetch('http://localhost:8080/chats', {
                    method: 'GET',
                    headers: {
                        'UserID': userId,
                        'Content-Type': 'application/json'
                    },
                    credentials: "include"
                });

                if (!response.ok) {
                    throw new Error(`Ошибка HTTP: ${response.status}`);
                }

                const chats = await response.json();

                loadingElement.style.display = 'none';

                if (chats.length === 0) {
                    chatsListElement.innerHTML = '<li class="chat-item"><div class="chat-name">Чатов пока нет</div></li>';
                } else {
                    chats.chats.forEach(chat => {
                        const li = document.createElement('li');
                        li.className = 'chat-item';
                        li.innerHTML = `<div class="chat-name">${chat.name}</div>`;
                        chatsListElement.appendChild(li);
                    });
                }

            } catch (error) {
                loadingElement.style.display = 'none';
                errorElement.style.display = 'block';
                errorElement.textContent = `Ошибка при загрузке чатов: ${error.message}`;
                console.error('Ошибка:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            //displayUserId();
            loadChats();
        });
    </script>
</body>

</html>
